    <style>
        :root {
            --sunset-orange: #ff7e5f;
            --sunset-pink: #feb47b;
            --dark-blue: #1a1c2c;
        }
        body {
            margin: 0;
            background: linear-gradient(135deg, var(--dark-blue) 0%, #4a192c 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1920') no-repeat center/cover;

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin: -50px 20px 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .art-item {
            width: 100%;
            height: 300px;
            background: #2a2a2a;
            border-radius: 15px;
            object-fit: cover;
            transition: 0.3s;
            cursor: pointer;
        }
        .art-item:hover { transform: translateY(-5px); border: 2px solid var(--sunset-pink); }
        .price-tag {
            display: inline-block;
            background: var(--sunset-orange);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .btn-contact {
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            color: #1a1c2c;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
