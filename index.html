<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrek Hollow Horn | Desert Cyber-Western Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --deep-rust: #8b3a2b; /* Rojo óxido profundo */
            --desert-sand: #d2b48c; /* Café arena */
            --dark-earth: #1a0f0a; /* Fondo casi negro/marrón */
            --leather: #3e2723; /* Marrón cuero */
        }

        body {
            margin: 0;
            background-color: var(--dark-earth);
            /* Textura de sutil arena de fondo */
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');
            color: var(--desert-sand);
            font-family: 'Courier New', Courier, monospace; /* Tipografía tipo máquina de escribir */
            text-align: center;
        }

        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Fondo de desierto Western real (con cañones) */
            background: linear-gradient(to bottom, rgba(26,15,10,0.8), rgba(139,58,43,0.3)),
                        url('https://images.unsplash.com/photo-1596711689815-53416a96e6d3?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--deep-rust);
            position: relative;
        }

        h1 { 
            font-size: 3rem; 
            margin: 0; 
            color: var(--desert-sand);
            text-shadow: 2px 2px 0 var(--dark-earth), 0 0 15px rgba(210,180,140,0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle { font-size: 1.1rem; opacity: 0.9; margin-top: 10px; color: var(--deep-rust); font-weight: bold; letter-spacing: 1px; }

        .container {
            max-width: 900px;
            margin: -60px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .western-card {
            background-color: var(--leather);
            background-image: url('https://www.transparenttextures.com/patterns/leather.png'); /* Textura de cuero */
            border: 3px solid var(--deep-rust);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h2 { 
            color: var(--deep-rust); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 30px;
            font-size: 1.6rem;
        }

        /* Sección de Redes Sociales */
        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .social-item {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 5px;
            text-decoration: none;
            color: var(--desert-sand);
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .social-item:hover {
            border-color: var(--deep-rust);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(139,58,43,0.3);
        }

        .social-item i { font-size: 2rem; margin-bottom: 10px; display: block; color: var(--deep-rust); }

        .email-box {
            background: var(--deep-rust);
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .email-box:hover { background: var(--dark-earth); border: 1px solid var(--deep-rust); color: var(--deep-rust); }

        hr { border: 0; height: 1px; background: var(--deep-rust); margin: 30px 0; opacity: 0.5; }
        
        .separator { color: var(--deep-rust); font-weight: bold; margin: 0 10px; }
    </style>
</head>
<body>

<header>
    <h1>Astrek<br>Hollow Horn</h1>
    <p class="subtitle">DESERT CYBER-WESTERN ARTIST // DIGITAL ILLUSTRATION</p>
</header>

<div class="container">
    <div class="western-card">
        <h2><span class="separator">•</span> WANTED ON <span class="separator">•</span></h2>
        
        <div class="social-links">
            <a href="https://t.me/AstrekHollowHorn" target="_blank" class="social-item">
                <i class="fab fa-telegram-plane"></i>
                <strong>Telegram</strong>
            </a>

            <a href="https://x.com/AstrekHH" target="_blank" class="social-item">
                <i class="fab fa-twitter"></i>
                <strong>Twitter</strong>
            </a>

            <a href="https://www.facebook.com/share/18HXvoWopY/" target="_blank" class="social-item">
                <i class="fab fa-facebook-f"></i>
                <strong>Facebook</strong>
            </a>
        </div>

        <hr>

        <h2><span class="separator">•</span> TRANSMISSION <span class="separator">•</span></h2>
        <p>FOR COMMISSIONS, SEND YOUR REQUEST HERE:</p>
        <a href="mailto:astrekhollowhorn@gmail.com" class="email-box">
            <i class="fas fa-satellite-dish"></i> astrekhollowhorn@gmail.com
        </a>
    </div>
</div>

<footer style="padding-bottom: 40px; opacity: 0.5; font-size: 0.8rem;">
    <p>© 2026 Astrek Hollow Horn // Desert Outpost // Signal stable.</p>
</footer>

</body>
</html>
