<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrek Hollow Horn | Desert Cyber-Western Art</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --deep-rust: #8b3a2b; 
            --desert-sand: #d2b48c; 
            --alien-neon: #00ff41; 
            --dark-earth: #1a0f0a; 
            --leather: #3e2723; 
        }

        body {
            margin: 0;
            background-color: var(--dark-earth);
            background-image: url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');
            color: var(--desert-sand);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }

        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, rgba(26,15,10,0.8), rgba(139,58,43,0.5)),
                        url('https://images.unsplash.com/photo-1533106418989-88406c7cc8ca?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            border-bottom: 4px solid var(--deep-rust);
            position: relative;
        }

        h1 { 
            font-size: 3rem; 
            margin: 0; 
            color: var(--deep-rust);
            text-shadow: 2px 2px 0 var(--dark-earth);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        h1::before, h1::after {
            content: '\f2e3'; 
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            font-size: 2rem;
            margin: 0 10px;
            color: var(--desert-sand);
        }

        .container {
            max-width: 900px;
            margin: -60px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .western-card {
            background-color: var(--leather);
            background-image: url('https://www.transparenttextures.com/patterns/leather.png');
            border: 3px solid var(--deep-rust);
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .social-item {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 5px;
            text-decoration: none;
            color: var(--desert-sand);
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .social-item:hover {
            border-color: var(--alien-neon);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .social-item i { font-size: 2rem; margin-bottom: 10px; display: block; color: var(--deep-rust); }

        .email-box {
            background: var(--deep-rust);
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
        }

        .email-box:hover { background: var(--dark-earth); border: 1px solid var(--deep-rust); }

        .alien-glyph { color: var(--alien-neon); font-size: 1.2rem; margin: 0 5px; }
    </style>
</head>
<body>

<header>
    <h1>Astrek<br>Hollow Horn</h1>
    <p style="letter-spacing: 2px;">DESERT CYBER-WESTERN ARTIST</p>
</header>

<div class="container">
    <div class="western-card">
        <h2><span class="alien-glyph">ü6·9</span> WANTED ON <span class="alien-glyph">ü6·9</span></h2>
        
        <div class="social-links">
            <a href="https://t.me/AstrekHollowHorn" target="_blank" class="social-item">
                <i class="fab fa-telegram-plane"></i>
                <strong>Telegram</strong>
            </a>
            <a href="https://x.com/AstrekHH" target="_blank" class="social-item">
                <i class="fab fa-twitter"></i>
                <strong>Twitter</strong>
            </a>
            <a href="https://www.facebook.com/share/18HXvoWopY/" target="_blank" class="social-item">
                <i class="fas fa-skull"></i>
                <strong>Facebook</strong>
            </a>
        </div>

        <hr style="border: 0; height: 1px; background: var(--deep-rust); margin: 30px 0;">

        <h2><span class="alien-glyph">ü6ļ8</span> TRANSMISSION <span class="alien-glyph">ü6ļ8</span></h2>
        <p>Inquire for commissions here:</p>
        <a href="mailto:astrekhollowhorn@gmail.com" class="email-box">
            <i class="fas fa-satellite-dish"></i> astrekhollowhorn@gmail.com
        </a>
    </div>
</div>

<footer style="padding-bottom: 40px; opacity: 0.5; font-size: 0.8rem;">
    <p>ü0ä8 2026 Astrek Hollow Horn // Signal established.</p>
</footer>

</body>
</html>
