<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portafolio Artístico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #ff7e5f, #feb47b); padding: 50px 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 15px; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .btn { display: inline-block; padding: 10px 20px; background: #feb47b; color: #1a1a1a; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Mi Galería Digital</h1>
        <p>Ilustraciónes y detalles</p>
        <a href="#contacto" class="btn">¡Pide una Comisión!</a>
    </header>

    <div class="gallery">
        <div class="card"><h3>Ilustración 1</h3><p>Descripción del arte</p></div>
        <div class="card"><h3>Ilustración 2</h3><p>Descripción del arte</p></div>
        <div class="card"><h3>Ilustración 3</h3><p>Descripción del arte</p></div>
    </div>

    <footer id="contacto" style="padding: 20px;">
        <p>Contacto: astrekhollowhorn@gmail.com</p>
    </footer>

</body>
</html>
